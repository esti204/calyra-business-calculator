<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calyra — Create Account</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="loadingSpinner" class="spinner-overlay">
    <div class="spinner"></div>
    <p>Loading Calyra…</p>
  </div>

  <div class="auth-bg">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-mark">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
            <polyline points="16 7 22 7 22 13"/>
          </svg>
        </div>
        <h1>Calyra</h1>
        <p>Business Intelligence Suite</p>
      </div>

      <h2>Create account</h2>
      <p class="subtitle">Start making smarter business decisions</p>

      <div id="signupAlert" class="alert alert-error" role="alert">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="signupAlertMsg">Error</span>
      </div>

      <div id="signupSuccess" class="alert alert-success" role="alert">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        <span>Account created! Redirecting…</span>
      </div>

      <form id="signupForm" novalidate>
        <div class="form-group">
          <label for="signupName">Full Name</label>
          <div class="input-wrap">
            <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="signupName" placeholder="Jane Smith" autocomplete="name" required>
          </div>
        </div>

        <div class="form-group">
          <label for="signupEmail">Email Address</label>
          <div class="input-wrap">
            <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email" required>
          </div>
        </div>

        <div class="form-group">
          <label for="signupPassword">Password</label>
          <div class="input-wrap">
            <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="signupPassword" placeholder="Min. 6 characters" autocomplete="new-password" required>
            <button type="button" class="toggle-password" onclick="togglePassword('signupPassword', this)" aria-label="Toggle">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="signupConfirm">Confirm Password</label>
          <div class="input-wrap">
            <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="signupConfirm" placeholder="Repeat password" autocomplete="new-password" required>
            <button type="button" class="toggle-password" onclick="togglePassword('signupConfirm', this)" aria-label="Toggle">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="signupBtn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
          Create Account
        </button>
      </form>

      <div class="divider">or</div>

      <button class="btn btn-secondary btn-full" onclick="toggleTheme()" style="margin-bottom:8px;">
        <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        Toggle Dark Mode
      </button>

      <p class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </p>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    window.addEventListener('load', () => {
      document.getElementById('loadingSpinner').style.display = 'none';
    });

    const session = localStorage.getItem('calyra_session');
    if (session) window.location.href = 'dashboard.html';

    document.getElementById('signupForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim().toLowerCase();
      const password = document.getElementById('signupPassword').value;
      const confirm = document.getElementById('signupConfirm').value;
      const btn = document.getElementById('signupBtn');

      hideAlert('signupAlert');
      hideAlert('signupSuccess');

      if (!name || !email || !password || !confirm) {
        showAlert('signupAlert', 'signupAlertMsg', 'Please fill in all fields.');
        return;
      }

      if (name.length < 2) {
        showAlert('signupAlert', 'signupAlertMsg', 'Name must be at least 2 characters.');
        return;
      }

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        showAlert('signupAlert', 'signupAlertMsg', 'Please enter a valid email address.');
        return;
      }

      if (password.length < 6) {
        showAlert('signupAlert', 'signupAlertMsg', 'Password must be at least 6 characters.');
        return;
      }

      if (password !== confirm) {
        showAlert('signupAlert', 'signupAlertMsg', 'Passwords do not match.');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<div class="spinner" style="width:18px;height:18px;border-width:2px;margin:0"></div> Creating account…';

      setTimeout(() => {
        const users = JSON.parse(localStorage.getItem('calyra_users') || '[]');
        if (users.find(u => u.email === email)) {
          showAlert('signupAlert', 'signupAlertMsg', 'An account with this email already exists.');
          btn.disabled = false;
          btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg> Create Account`;
          return;
        }

        const newUser = { id: Date.now(), name, email, password: btoa(password), createdAt: Date.now() };
        users.push(newUser);
        localStorage.setItem('calyra_users', JSON.stringify(users));
        localStorage.setItem('calyra_session', JSON.stringify({ email, name, loginAt: Date.now() }));

        document.getElementById('signupSuccess').classList.add('show');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
      }, 700);
    });
  </script>
</body>
</html>
