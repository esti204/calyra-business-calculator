<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calyra — Login</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
  <!-- Loading Spinner -->
  <div id="loadingSpinner" class="spinner-overlay">
    <div class="spinner"></div>
    <p>Loading Calyra…</p>
  </div>

  <div class="auth-bg">
    <div class="auth-card">
      <!-- Logo -->
      <div class="auth-logo">
        <div class="logo-mark">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
            <polyline points="16 7 22 7 22 13"/>
          </svg>
        </div>
        <h1>Calyra</h1>
        <p>Business Intelligence Suite</p>
      </div>

      <h2>Welcome back</h2>
      <p class="subtitle">Sign in to your dashboard</p>

      <!-- Alert -->
      <div id="loginAlert" class="alert alert-error" role="alert">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="loginAlertMsg">Invalid credentials.</span>
      </div>

      <!-- Form -->
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="loginEmail">Email Address</label>
          <div class="input-wrap">
            <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email" required>
          </div>
        </div>

        <div class="form-group">
          <label for="loginPassword">Password</label>
          <div class="input-wrap">
            <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" required>
            <button type="button" class="toggle-password" onclick="togglePassword('loginPassword', this)" aria-label="Toggle password visibility">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          Sign In
        </button>
      </form>

      <div class="divider">or</div>

      <!-- Dark mode toggle on login page -->
      <button class="btn btn-secondary btn-full" onclick="toggleTheme()" style="margin-bottom: 8px;">
        <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        Toggle Dark Mode
      </button>

      <p class="auth-footer">
        Don't have an account? <a href="signup.html">Create one</a>
      </p>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    // Hide spinner once page loads
    window.addEventListener('load', () => {
      document.getElementById('loadingSpinner').style.display = 'none';
    });

    // Check if already logged in
    const session = localStorage.getItem('calyra_session');
    if (session) window.location.href = 'dashboard.html';

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const btn = document.getElementById('loginBtn');

      hideAlert('loginAlert');

      if (!email || !password) {
        showAlert('loginAlert', 'loginAlertMsg', 'Please fill in all fields.');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<div class="spinner" style="width:18px;height:18px;border-width:2px;margin:0"></div> Signing in…';

      setTimeout(() => {
        const users = JSON.parse(localStorage.getItem('calyra_users') || '[]');
        const user = users.find(u => u.email === email);

        if (!user) {
          showAlert('loginAlert', 'loginAlertMsg', 'No account found with this email. Please sign up.');
          btn.disabled = false;
          btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Sign In';
          return;
        }

        if (user.password !== btoa(password)) {
          showAlert('loginAlert', 'loginAlertMsg', 'Incorrect password. Please try again.');
          btn.disabled = false;
          btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Sign In';
          return;
        }

        localStorage.setItem('calyra_session', JSON.stringify({ email: user.email, name: user.name, loginAt: Date.now() }));
        window.location.href = 'dashboard.html';
      }, 800);
    });
  </script>
</body>
</html>
